  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"7adc7bf8-5630-4cf1-8534-02774e70e5c2\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<style>\n@font-face{font-family:'DM Sans';src:url(\"118d11a8-2c90-4d98-964d-4523db64f053\") format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}\n@font-face{font-family:'DM Sans';src:url(\"00f83284-5b42-41be-b062-56076ab60948\") format('truetype');font-weight:100 900;font-style:italic;font-display:swap;}\nbody{margin:0;background:#fff;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#fff;padding:2rem 1rem;box-sizing:border-box;\">\n<div style=\"max-width:800px;margin:0 auto;background:#F7F6F2;border:1px solid #E2E0DA;border-radius:16px;padding:2rem;box-shadow:0 2px 24px rgba(0,0,0,0.07);\">\n\n  <div style=\"background:#00326E;border-radius:12px;padding:20px 24px;margin-bottom:2rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n    <div>\n      <div style=\"font-size:18px;font-weight:500;color:#fff;margin-bottom:3px;\">OD Manager Dashboard<\u002Fdiv>\n      <div style=\"font-size:12px;color:#9FC4E8;\">Launch Housing · Organisational Development<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;\">\n      <span style=\"font-size:11px;font-weight:500;color:#5DCAA5;background:rgba(255,255,255,0.12);border-radius:20px;padding:5px 14px;white-space:nowrap;transition:opacity 0.3s;opacity:{{ savedOpacity }};\">✓ Saved<\u002Fspan>\n      <button onclick=\"{{ onExport }}\" style=\"font-size:11px;font-weight:500;padding:6px 13px;border-radius:20px;cursor:pointer;white-space:nowrap;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:#fff;\" style-hover=\"background:rgba(255,255,255,0.2);\">↓ Export data<\u002Fbutton>\n      <button onclick=\"{{ onImport }}\" style=\"font-size:11px;font-weight:500;padding:6px 13px;border-radius:20px;cursor:pointer;white-space:nowrap;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:#fff;\" style-hover=\"background:rgba(255,255,255,0.2);\">↑ Import data<\u002Fbutton>\n      <button onclick=\"{{ onWeekPdf }}\" title=\"Generate an end-of-week PDF summary\" style=\"font-size:11px;font-weight:600;padding:6px 13px;border-radius:20px;cursor:pointer;white-space:nowrap;border:1px solid #00BAD2;background:#00BAD2;color:#00326E;\" style-hover=\"background:#33CADD;border-color:#33CADD;\">📄 Week summary<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-bottom:2rem;\">\n    <div style=\"display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:#00326E;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;\"><span>☑ To-do list<\u002Fspan><span style=\"flex:1;height:1px;background:#E5E4E0;\"><\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;\">\n      <input type=\"text\" value=\"{{ newTodoText }}\" onchange=\"{{ setTodoText }}\" onkeydown=\"{{ todoKey }}\" placeholder=\"Add a task…\" style=\"flex:1;min-width:150px;font-size:13px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;box-sizing:border-box;\" style-focus=\"border-color:#00BAD2;\">\n      <input type=\"date\" value=\"{{ newTodoDate }}\" onchange=\"{{ setTodoDate }}\" title=\"Optional due date\" style=\"font-size:13px;padding:9px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#888;width:140px;outline:none;box-sizing:border-box;\" style-focus=\"border-color:#00BAD2;\">\n      <select value=\"{{ newTodoType }}\" onchange=\"{{ setTodoType }}\" style=\"font-size:13px;padding:9px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;\">\n        <option value=\"bau\">BAU<\u002Foption>\n        <option value=\"meeting\">Meeting<\u002Foption>\n        <option value=\"project\">Project<\u002Foption>\n      <\u002Fselect>\n      <button onclick=\"{{ addTodo }}\" style=\"font-size:13px;padding:9px 16px;border:none;border-radius:8px;background:#00326E;color:#fff;cursor:pointer;font-weight:500;white-space:nowrap;\" style-hover=\"background:#002558;\">+ Add<\u002Fbutton>\n    <\u002Fdiv>\n    <sc-if value=\"{{ noTodos }}\" hint-placeholder-val=\"{{ true }}\">\n      <p style=\"font-size:13px;color:#aaa;padding:8px 0;\">No tasks yet — add one above.<\u002Fp>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ hasTodos }}\">\n      <div>\n        <sc-for list=\"{{ todoRows }}\" as=\"row\" hint-placeholder-count=\"3\">\n          <div style=\"{{ row.itemStyle }}\">\n            <div onclick=\"{{ row.onToggle }}\" style=\"{{ row.chkStyle }}\">\n              <sc-if value=\"{{ row.done }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"width:5px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(40deg) translateY(-1px);\"><\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n            <span style=\"{{ row.labelStyle }}\">{{ row.text }}<\u002Fspan>\n            <sc-if value=\"{{ row.hasDue }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ row.dueStyle }}\">{{ row.dueLabel }}<\u002Fspan><\u002Fsc-if>\n            <span style=\"{{ row.tagStyle }}\">{{ row.tagLabel }}<\u002Fspan>\n            <sc-if value=\"{{ row.canCal }}\" hint-placeholder-val=\"{{ false }}\"><button title=\"Add to calendar\" onclick=\"{{ row.onCal }}\" style=\"background:none;border:none;cursor:pointer;color:#00BAD2;font-size:14px;padding:0 2px;line-height:1;opacity:0.5;flex-shrink:0;\" style-hover=\"opacity:1;\">📅<\u002Fbutton><\u002Fsc-if>\n            <button onclick=\"{{ row.onDelete }}\" style=\"background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:0 2px;line-height:1;\" style-hover=\"color:#c0392b;\">×<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ showWeekFocus }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"margin-bottom:2rem;\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;\">\n        <span style=\"font-size:11px;font-weight:600;color:#00326E;text-transform:uppercase;letter-spacing:0.07em;white-space:nowrap;\">📅 This week's focus<\u002Fspan>\n        <span style=\"font-size:11px;color:#9a9a94;white-space:nowrap;\">Week of {{ weekOf }}<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:#E5E4E0;\"><\u002Fspan>\n        <button title=\"Clear all focus notes and start a fresh week\" onclick=\"{{ startNewWeek }}\" style=\"font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#00326E;background:#fff;border:1px solid #E8E7E3;border-radius:20px;padding:5px 11px;cursor:pointer;white-space:nowrap;flex-shrink:0;\" style-hover=\"border-color:#00326E;\">↻ Start new week<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:6px;\">\n        <sc-for list=\"{{ focusCards }}\" as=\"c\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;gap:14px;align-items:flex-start;background:#fff;border:1px solid #E8E7E3;border-radius:10px;padding:11px 14px;border-left:3px solid #00BAD2;\">\n            <div style=\"width:150px;flex-shrink:0;font-size:11px;font-weight:600;color:#00326E;line-height:1.35;padding-top:4px;overflow-wrap:break-word;word-break:break-word;\">{{ c.name }}<\u002Fdiv>\n            <textarea data-focus-grow=\"1\" rows=\"1\" value=\"{{ c.value }}\" onchange=\"{{ c.onChange }}\" placeholder=\"One thing to focus on this week…\" style=\"flex:1;min-width:0;font-size:13px;color:#1a1a1a;background:none;border:none;border-bottom:1px solid #eee;padding:4px 0;outline:none;resize:none;overflow:hidden;line-height:1.5;font-family:inherit;box-sizing:border-box;\" style-focus=\"border-bottom-color:#00BAD2;\"><\u002Ftextarea>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"margin-bottom:2rem;\">\n    <div style=\"display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:#00326E;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;\"><span>📝 This week's tasks<\u002Fspan><span style=\"flex:1;height:1px;background:#E5E4E0;\"><\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:6px;\">\n      <sc-for list=\"{{ dayRows }}\" as=\"d\" hint-placeholder-count=\"5\">\n        <div style=\"{{ d.rowStyle }}\">\n          <div style=\"{{ d.labelStyle }}\">{{ d.label }}<sc-if value=\"{{ d.isToday }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:block;font-size:9px;font-weight:700;color:#00326E;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;\">Today<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n          <textarea data-daily-grow=\"1\" rows=\"1\" value=\"{{ d.value }}\" onchange=\"{{ d.onChange }}\" placeholder=\"Tasks for {{ d.label }}…\" style=\"flex:1;min-width:0;font-size:13px;color:#1a1a1a;background:none;border:none;border-bottom:1px solid #eee;padding:4px 0;outline:none;resize:none;overflow:hidden;line-height:1.55;font-family:inherit;box-sizing:border-box;\" style-focus=\"border-bottom-color:#00BAD2;\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-bottom:2rem;\">\n    <div style=\"display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:#00326E;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;\"><span>📊 Overview<\u002Fspan><span style=\"flex:1;height:1px;background:#E5E4E0;\"><\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:8px;\">\n      <div style=\"background:#fff;border:1px solid #E8E7E3;border-radius:8px;p ;\n    }, ()=>this.persist());\n  }\n  toggleMsOpen(pid){\n    this.setState(s=>{\n      var cur = s.openMs[pid]!==undefined ? s.openMs[pid] : (this.props.defaultMilestonesOpen||false);\n      var openMs=Object.assign({},s.openMs); openMs[pid]=!cur;\n      return {openMs:openMs};\n    });\n  }\n  deleteProject(pid){\n    if(!confirm('Delete this project and all its milestones?')) return;\n    this.setState(s=>({projects:s.projects.filter(p=>p.id!==pid)}), ()=>this.persist());\n  }\n\n  openNewProj(){ this.setState({npOpen:true}); }\n  closeNewProj(){ this.setState({npOpen:false,npName:'',npDue:''}); }\n  saveNewProj(){\n    var name=(this.state.npName||'').trim(); if(!name){ alert('Please enter a project name.'); return; }\n    var type=this.state.npType, due=(this.state.npDue||'').trim();\n    var color = type==='fixed' ? '#00326E' : '#00BAD2';\n    var newProj={id:this.uid(),name:name,type:type,color:color,due:due,ms:[]};\n    this.setState(s=>{\n      var projects=s.projects.slice();\n      if(type==='fixed'){\n        // insert after the last fixed project (end of the Fixed group)\n        var lastFixed=-1;\n        for(var i=0;i<projects.length;i++){ if(projects[i].type==='fixed') lastFixed=i; }\n        projects.splice(lastFixed+1, 0, newProj);\n      } else {\n        projects.push(newProj);\n      }\n      return {projects:projects, npOpen:false, npName:'', npDue:''};\n    }, ()=>this.persist());\n  }\n\n  // drag reorder\n  onDragStart(e,pid,mi){ e.dataTransfer.effectAllowed='move'; this.setState({dragSrcPid:pid,dragSrcIdx:mi}); }\n  onDragOver(e,pid,mi){ e.preventDefault(); e.dataTransfer.dropEffect='move'; var key=pid+'-'+mi; if(this.state.dragOver!==key) this.setState({dragOver:key}); }\n  onDrop(e,pid,mi){\n    e.preventDefault();\n    var src=this.state.dragSrcPid, si=this.state.dragSrcIdx;\n    if(src!==pid || si===mi || si===null){ this.setState({dragSrcPid:null,dragSrcIdx:null,dragOver:null}); return; }\n    this.setState(s=>{\n      var projects=s.projects.map(p=>{\n        if(p.id!==pid) return p;\n        var ms=p.ms.slice(); var moved=ms.splice(si,1)[0]; ms.splice(mi>si?mi-1:mi,0,moved);\n        return Object.assign({},p,{ms:ms});\n      });\n      return {projects:projects,dragSrcPid:null,dragSrcIdx:null,dragOver:null};\n    }, ()=>this.persist());\n  }\n  onDragEnd(){ this.setState({dragSrcPid:null,dragSrcIdx:null,dragOver:null}); }\n\n  // modal\n  openExport(){\n    var data={todos:this.state.todos,tid:this.state.tid,projects:this.state.projects,focusValues:this.state.focusValues};\n    this.setState({modalOpen:true,modalMode:'export',modalTitle:'Export data',modalDesc:'Copy this JSON and save it somewhere safe. Use Import to restore it.',modalText:JSON.stringify(data,null,2),modalBtn:'Copy to clipboard'});\n  }\n  openImport(){\n    this.setState({modalOpen:true,modalMode:'import',modalTitle:'Import data',modalDesc:'Paste your previously exported JSON here and click Import. This will replace all current data.',modalText:'',modalBtn:'Import & restore'});\n  }\n  closeModal(){ this.setState({modalOpen:false}); }\n  modalAction(){\n    if(this.state.modalMode==='export'){\n      var txt=this.state.modalText;\n      if(navigator.clipboard){\n        navigator.clipboard.writeText(txt).then(()=>{ this.setState({modalBtn:'Copied!'}); setTimeout(()=>this.setState({modalBtn:'Copy to clipboard'}),2000); });\n      }\n    } else {\n      try{\n        var d=JSON.parse(this.state.modalText);\n        if(d.projects && d.todos!==undefined){\n          this.setState({todos:d.todos||[],tid:d.tid||0,projects:d.projects||[],focusValues:d.focusValues||{},modalOpen:false}, ()=>this.persist());\n        } else { alert('Invalid data — please paste a valid export.'); }\n      }catch(e){ alert('Could not parse JSON. Please check the data and try again.'); }\n    }\n  }\n\n  // ICS\n  parseDate(str){\n    if(!str) return null;\n    var months={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};\n    var s=str.trim().toLowerCase();\n    var m=s.match(/^(\\d{1,2})\\s+([a-z]{3})(\\s+\\d{4})?$/);\n    if(m && months[m[2]]){\n      var yr=m[3]?parseInt(m[3].trim()):new Date().getFullYear();\n      var d=new Date(yr, months[m[2]]-1, parseInt(m[1]));\n      if(d<new Date() && !m[3]) d.setFullYear(d.getFullYear()+1);\n      return d;\n    }\n    return null;\n  }\n  pad2(n){ return n<10?'0'+n:''+n; }\n  buildICS(summary, d, desc){\n    var start=d.getFullYear()+''+this.pad2(d.getMonth()+1)+''+this.pad2(d.getDate());\n    var nd=new Date(d); nd.setDate(nd.getDate()+1);\n    var end=nd.getFullYear()+''+this.pad2(nd.getMonth()+1)+''+this.pad2(nd.getDate());\n    var now=new Date();\n    var stamp=now.getUTCFullYear()+''+this.pad2(now.getUTCMonth()+1)+''+this.pad2(now.getUTCDate())+'T'+this.pad2(now.getUTCHours())+''+this.pad2(now.getUTCMinutes())+''+this.pad2(now.getUTCSeconds())+'Z';\n    var ics='BEGIN:VCALENDAR\\r\\nVERSION:2.0\\r\\nPRODID:-//OD Dashboard//Launch Housing//EN\\r\\nCALSCALE:GREGORIAN\\r\\nMETHOD:PUBLISH\\r\\nBEGIN:VEVENT\\r\\nUID:od-'+Date.now()+Math.floor(Math.random()*1000)+'@launchhousing\\r\\nDTSTAMP:'+stamp+'\\r\\nDTSTART;VALUE=DATE:'+start+'\\r\\nDTEND;VALUE=DATE:'+end+'\\r\\nSUMMARY:'+summary+'\\r\\nDESCRIPTION:'+desc+'\\r\\nBEGIN:VALARM\\r\\nTRIGGER:-PT30M\\r\\nACTION:DISPLAY\\r\\nDESCRIPTION:Reminder\\r\\nEND:VALARM\\r\\nEND:VEVENT\\r\\nEND:VCALENDAR';\n    var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});\n    var url=URL.createObjectURL(blob);\n    var a=document.createElement('a'); a.href=url; a.download='event.ics'; document.body.appendChild(a); a.click(); document.body.removeChild(a);\n    URL.revokeObjectURL(url);\n  }\n  dlICS(proj,msText,dateStr){\n    var d=this.parseDate(dateStr);\n    if(!d){ alert('Could not read date \"'+dateStr+'\".\\nUse the 📆 picker (or type a date like \"25 Jun\") so it can be added to your calendar.'); return; }\n    this.buildICS('[OD] '+proj+': '+msText, d, 'Milestone from OD Manager Dashboard\\\\nProject: '+proj);\n  }\n  dlTodoICS(text, isoDue){\n    if(!isoDue){ alert('Add a due date to this task first to add it to your calendar.'); return; }\n    var d=new Date(isoDue+'T00:00:00'); if(isNaN(d.getTime())) d=new Date(isoDue);\n    if(isNaN(d.getTime())){ alert('Could not read the due date for this task.'); return; }\n    d.setHours(0,0,0,0);\n    this.buildICS('[OD] '+text, d, 'Task from OD Manager Dashboard');\n  }\n  pickMsDateVal(pid, mi, val, el){\n    if(val){\n      var d=new Date(val+'T00:00:00');\n      if(!isNaN(d.getTime())) this.editMs(pid, mi, 'd', d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}));\n    }\n    if(el) el.value='';\n  }\n  pickNewMsDate(pid, val, el){\n    if(val){\n      var d=new Date(val+'T00:00:00');\n      if(!isNaN(d.getTime())) this.setNewMs(pid, 'd', d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}));\n    }\n    if(el) el.value='';\n  }\n\n  renderVals(){\n    var s=this.state;\n    var sortByDue = this.props.sortTodosByDue ?? true;\n    var showWeekFocus = this.props.showWeekFocus ?? true;\n    var today=new Date(); today.setHours(0,0,0,0);\n    var soon=new Date(today); soon.setDate(soon.getDate()+3);\n\n    // ---- todos ----\n    var active=s.todos.filter(t=>!t.done);\n    if(sortByDue){\n      active.sort((a,b)=>{ if(!a.due&&!b.due)return 0; if(!a.due)return 1; if(!b.due)return -1; return new Date(a.due)-new Date(b.due); });\n    }\n    var allTodos=active.concat(s.todos.filter(t=>t.done));\n    var tagMap={bau:['#E6F1FB','#0C447C','BAU'],meeting:['#EEEDFE','#3C3489','Meeting'],project:['#E1F5EE','#085041','Project']};\n    var self=this;\n    var todoRows=allTodos.map(function(t){\n      var dm = !t.done ? self.dueMeta(t.due,today,soon) : null;\n      var tag = tagMap[t.type]||tagMap.bau;\n      var itemStyle='display:flex;align-items:center;gap:10px;padding:10px 13px;background:#fff;border:1px solid #E8E7E3;border-radius:8px;margin-bottom:5px;'+(dm&&dm.overdue?'border-left:3px solid #A32D2D;':'');\n      var chkStyle='width:17px;height:17px;border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;'+(t.done?'background:#00BAD2;border:1.5px solid #00BAD2;':'border:1.5px solid #ccc;background:transparent;');\n      var labelStyle='flex:1;font-size:13px;'+(t.done?'text-decoration:line-through;color:#aaa;':'color:#1a1a1a;');\n      return {\n        id:t.id, text:t.text, done:t.done,\n        itemStyle:itemStyle, chkStyle:chkStyle, labelStyle:labelStyle,\n        hasDue: !!dm, dueLabel: dm?dm.label:'',\n        dueStyle: dm?('font-size:11px;white-space:nowrap;padding:2px 8px;border-radius:20px;font-weight:500;background:'+dm.bg+';color:'+dm.color+';'):'',\n        tagLabel: tag[2],\n        tagStyle:'font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;background:'+tag[0]+';color:'+tag[1]+';',\n        canCal: !!t.due,\n        onCal: ()=>self.dlTodoICS(t.text, t.due),\n        onToggle: ()=>self.toggleTodo(t.id),\n        onDelete: ()=>self.deleteTodo(t.id)\n      };\n    });\n\n    // ---- focus ----\n    var focusCards=s.projects.map(function(p){\n      return {\n        id:p.id,\n        name: p.name,\n        value: s.focusValues[p.id]||'',\n        onChange: (e)=>self.editFocus(p.id, e.target.value)\n      };\n    });\n    var weekOf='';\n    try{ weekOf=new Date((s.focusWeek||'')+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}); }catch(e){}\n\n    // ---- weekday task notes ----\n    var dayDefs=[['mon','Monday'],['tue','Tuesday'],['wed','Wednesday'],['thu','Thursday'],['fri','Friday']];\n    var todayKey=['','mon','tue','wed','thu','fri',''][new Date().getDay()]||'';\n    var dayRows=dayDefs.map(function(d){\n      var isToday=d[0]===todayKey;\n      return {\n        key:d[0], label:d[1], isToday:isToday,\n        value:(s.dayNotes&&s.dayNotes[d[0]])||'',\n        rowStyle:'display:flex;gap:14px;align-items:flex-start;background:#fff;border:1px solid #E8E7E3;border-radius:10px;padding:11px 14px;border-left:3px solid '+(isToday?'#00326E':'#00BAD2')+';'+(isToday?'box-shadow:0 0 0 1px rgba(0,50,110,0.18);':''),\n        labelStyle:'width:84px;flex-shrink:0;font-size:11px;font-weight:600;padding-top:5px;color:'+(isToday?'#00326E':'#6a6a64')+';',\n        onChange:(e)=>self.editDay(d[0], e.target.value)\n      };\n    });\n\n    // ---- metrics ----\n    var total=0, doneCount=0;\n    s.projects.forEach(p=>{ total+=p.ms.length; doneCount+=p.ms.filter(m=>m.done).length; });\n\n    // ---- projects ----\n    var projCards=s.projects.map(function(p){\n      var isFixed=p.type==='fixed';\n      var pct=self.calcPct(p);\n      var leftColor=isFixed?'#00326E':'#00BAD2';\n      var color=p.color||leftColor;\n      var open = s.openMs[p.id]!==undefined ? s.openMs[p.id] : (self.props.defaultMilestonesOpen||false);\n      var msRows=p.ms.map(function(m,i){\n        var dragging = s.dragSrcPid===p.id && s.dragSrcIdx===i;\n        var dragOver = s.dragOver===(p.id+'-'+i);\n        var rowStyle='display:flex;align-items:center;gap:8px;padding:4px 0;'+(dragging?'opacity:0.4;':'')+(dragOver?'border-top:2px solid #00BAD2;':'');\n        var chkStyle='width:15px;height:15px;border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;'+(m.done?'background:#00BAD2;border:1.5px solid #00BAD2;':'border:1.5px solid #ccc;background:transparent;');\n        var textStyle='flex:1;font-size:12px;background:none;border:none;border-bottom:1px solid transparent;padding:2px 0;outline:none;min-width:0;'+(m.done?'text-decoration:line-through;color:#aaa;':'color:#1a1a1a;');\n        return {\n          pid:p.id, idx:i, t:m.t, d:m.d, done:m.done,\n          rowStyle:rowStyle, chkStyle:chkStyle, textStyle:textStyle,\n          onCheck: ()=>self.toggleMsCheck(p.id,i),\n          onText: (e)=>self.editMs(p.id,i,'t',e.target.value),\n          onDue: (e)=>self.editMs(p.id,i,'d',e.target.value),\n          onCal: ()=>self.dlICS(p.name,m.t,m.d),\n          onPickDate: (e)=>self.pickMsDateVal(p.id,i,e.target.value,e.target),\n          onDelete: ()=>self.deleteMs(p.id,i),\n          onDragStart: (e)=>self.onDragStart(e,p.id,i),\n          onDragOver: (e)=>self.onDragOver(e,p.id,i),\n          onDrop: (e)=>self.onDrop(e,p.id,i),\n          onDragEnd: ()=>self.onDragEnd()\n        };\n      });\n      var nm=s.newMs[p.id]||{t:'',d:''};\n      return {\n        id:p.id, name:p.name, due:p.due, pct:pct, color:color,\n        cardStyle:'background:#fff;border:1px solid #E8E7E3;border-radius:10px;padding:15px 17px;margin-bottom:8px;border-left:3px solid '+leftColor+';',\n        badgeLabel: isFixed?'Fixed':'Flexible',\n        badgeStyle:'font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;'+(isFixed?'background:#E6F1FB;color:#0C447C;':'background:#E1F5EE;color:#085041;'),\n        fillStyle:'height:100%;border-radius:3px;transition:width 0.3s;width:'+pct+'%;background:'+color+';',\n        open:open,\n        toggleLabel: open?'hide milestones':'show milestones',\n        chevTransform: open?'rotate(180deg)':'rotate(0deg)',\n        msRows:msRows,\n        newMsText: nm.t||'', newMsDue: nm.d||'',\n        onDueChange: (e)=>self.editDue(p.id,e.target.value),\n        onDelete: ()=>self.deleteProject(p.id),\n        onToggle: ()=>self.toggleMsOpen(p.id),\n        onNewMsText: (e)=>self.setNewMs(p.id,'t',e.target.value),\n        onNewMsDue: (e)=>self.setNewMs(p.id,'d',e.target.value),\n        onNewMsKey: (e)=>{ if(e.key==='Enter') self.addMs(p.id); },\n        onNewMsPick: (e)=>self.pickNewMsDate(p.id, e.target.value, e.target),\n        onAddMs: ()=>self.addMs(p.id)\n      };\n    });\n\n    return {\n      savedOpacity: s.savedShow?1:0,\n      onExport: ()=>this.openExport(),\n      onImport: ()=>this.openImport(),\n\n      newTodoText: s.newTodoText, newTodoDate: s.newTodoDate, newTodoType: s.newTodoType,\n      setTodoText: (e)=>this.setState({newTodoText:e.target.value}),\n      setTodoDate: (e)=>this.setState({newTodoDate:e.target.value}),\n      setTodoType: (e)=>this.setState({newTodoType:e.target.value}),\n      todoKey: (e)=>{ if(e.key==='Enter') this.addTodo(); },\n      addTodo: ()=>this.addTodo(),\n      hasTodos: todoRows.length>0, noTodos: todoRows.length===0, todoRows: todoRows,\n\n      showWeekFocus: showWeekFocus,\n      focusCards: focusCards,\n      weekOf: weekOf,\n      startNewWeek: ()=>this.startNewWeek(),\n      onWeekPdf: ()=>this.generateWeeklyPDF(),\n\n      dayRows: dayRows,\n\n      projCount: s.projects.length,\n      fixedCount: s.projects.filter(p=>p.type==='fixed').length,\n      doneCount: doneCount,\n      overallPct: total?Math.round((doneCount/total)*100):0,\n\n      projCards: projCards,\n\n      npOpen: s.npOpen, npClosed: !s.npOpen,\n      npName: s.npName, npType: s.npType, npDue: s.npDue,\n      setNpName: (e)=>this.setState({npName:e.target.value}),\n      setNpType: (e)=>this.setState({npType:e.target.value}),\n      setNpDue: (e)=>this.setState({npDue:e.target.value}),\n      openNewProj: ()=>this.openNewProj(),\n      closeNewProj: ()=>this.closeNewProj(),\n      saveNewProj: ()=>this.saveNewProj(),\n\n      modalOpen: s.modalOpen, modalTitle: s.modalTitle, modalDesc: s.modalDesc, modalText: s.modalText, modalBtn: s.modalBtn,\n      setModalText: (e)=>this.setState({modalText:e.target.value}),\n      closeModal: ()=>this.closeModal(),\n      modalAction: ()=>this.modalAction()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
